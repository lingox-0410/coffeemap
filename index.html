<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CoffeeMap · 咖啡风味鉴赏</title>
<meta name="description" content="一个简约高级的咖啡风味鉴赏记录工具：世界地图、风味统计、知识卡片、咖啡护照。">
<meta name="theme-color" content="#fbfbfd">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238a5a2b' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8z'/%3E%3Cpath d='M17 9h2a3 3 0 0 1 0 6h-2'/%3E%3Cpath d='M7 2.6c-.6 1-.6 2 0 3M11 2.6c-.6 1-.6 2 0 3'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/styles.css?v=20260621d">
</head>
<body>

  <!-- 顶部导航 -->
  <nav class="nav">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8a5a2b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13v5a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V8z"/><path d="M17 9h2a3 3 0 0 1 0 6h-2"/><path d="M7 2.6c-.6 1-.6 2 0 3M11 2.6c-.6 1-.6 2 0 3"/></svg></span>
      <span>CoffeeMap</span>
    </div>
    <div class="tabs">
      <button class="tab active" data-v="map">地图</button>
      <button class="tab" data-v="cards">卡片墙</button>
      <button class="tab" data-v="table">明细表</button>
      <button class="tab" data-v="stats">统计</button>
      <button class="tab" data-v="album">相册</button>
      <button class="tab" data-v="passport">护照</button>
    </div>
    <label class="search">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="search" placeholder="搜索产地 / 风味 / 咖啡店…">
    </label>
    <button class="acct-btn" id="acctBtn" style="display:none"></button>
    <button class="btn-add" id="addBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      记录一杯 <span style="opacity:.5">·</span> <span id="navCount">0</span>
    </button>
  </nav>

  <!-- 视图容器 -->
  <main class="wrap">
    <section id="view-map"      class="view active"></section>
    <section id="view-cards"    class="view"></section>
    <section id="view-table"    class="view"></section>
    <section id="view-stats"    class="view"></section>
    <section id="view-album"    class="view"></section>
    <section id="view-passport" class="view"></section>
  </main>

  <footer class="wrap" style="padding:30px 22px 50px;color:var(--ink-3);font-size:12.5px;border-top:1px solid var(--hairline);margin-top:20px">
    <div class="flex" style="justify-content:space-between;flex-wrap:wrap;gap:12px;align-items:center">
      <span>CoffeeMap · 数据保存在本地浏览器，隐私无忧</span>
      <span class="flex gap12">
        <a href="javascript:CM.app.exportData()">导出数据</a>
        <a href="javascript:CM.app.importData()">导入数据</a>
        <a href="javascript:CM.app.openForm()">记录一杯</a>
        <a href="javascript:CM.app.clearAll()" style="color:var(--ink-3)">清空</a>
      </span>
    </div>
  </footer>

  <!-- 移动端底部导航 + FAB（由 JS 填充图标）-->
  <nav class="botnav" id="botnav"></nav>
  <button class="fab" id="fabAdd" aria-label="记录一杯">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <!-- 依赖（本地，可离线）。?v= 版本号：每次更新都改它，强制所有人浏览器拿最新代码（不必手动清缓存）-->
  <script src="js/vendor/d3.v7.min.js?v=20260621d"></script>
  <script src="js/vendor/topojson-client.min.js?v=20260621d"></script>
  <script src="js/vendor/world-data.js?v=20260621d"></script>
  <script src="js/vendor/html2canvas.min.js?v=20260621d"></script>
  <!-- 应用 -->
  <script src="js/config.js?v=20260621d"></script>
  <script src="js/data.js?v=20260621d"></script>
  <script src="js/icons.js?v=20260621d"></script>
  <script src="js/knowledge-extra.js?v=20260621d"></script>
  <script src="js/vendor/img-manifest.js?v=20260621d"></script>
  <script src="js/cloud.js?v=20260621d"></script>
  <script src="js/store.js?v=20260621d"></script>
  <script src="js/seed.js?v=20260621d"></script>
  <script src="js/charts.js?v=20260621d"></script>
  <script src="js/map.js?v=20260621d"></script>
  <script src="js/knowledge.js?v=20260621d"></script>
  <script src="js/app.js?v=20260621d"></script>
</body>
</html>
